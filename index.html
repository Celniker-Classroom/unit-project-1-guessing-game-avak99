<!DOCTYPE html>
<html>
<head>
  <title>Pink Guessing Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<div class="container">

  <h1 class="title">Guessing Game</h1>

  <p id="date"></p>

  <div class="card">
    <h3>Select Level</h3>

    <label><input type="radio" name="level" value="3" id="easy" checked> Easy</label>
    <label><input type="radio" name="level" value="10" id="medium"> Medium</label>
    <label><input type="radio" name="level" value="100" id="hard"> Hard</label>
    <label><input type="radio" name="level" value="custom" id="custom"> Custom</label>

    <br><br>

    <input type="number" id="customRange" placeholder="Enter max number" disabled>
  </div>

  <button id="playBtn">Play</button>
  <button id="darkModeToggle">Toggle Dark Mode</button>

  <h3 id="msg">Select a level and press play</h3>

  <div class="card">
    <input type="number" id="guess" placeholder="Enter guess" disabled>
    <br>
    <button id="guessBtn" disabled>Guess</button>
    <button id="giveUpBtn" disabled>Give Up</button>
  </div>

  <div class="card">
    <h3>Stats</h3>
    <p id="wins">Wins: 0</p>
    <p id="avgScore">Average Score:</p>
    <p id="fastest">Fastest:</p>
    <p id="avgTime">Average Time:</p>
  </div>

  <div class="card">
    <h3>Leaderboard</h3>
    <ol>
      <li name="leaderboard">--</li>
      <li name="leaderboard">--</li>
      <li name="leaderboard">--</li>
    </ol>
  </div>

</div>

</body>
</html>
