<!DOCTYPE html>
<html>
<head>
  <title>Guessing Game</title>
</head>
<body>

  <p id="date"></p>

  <div>
    <input type="radio" name="level" id="e" value="3"> Easy
    <input type="radio" name="level" id="m" value="10"> Medium
    <input type="radio" name="level" id="h" value="100"> Hard
  </div>

  <button id="playBtn">Play</button>
  <button id="guessBtn">Guess</button>
  <button id="giveUpBtn">Give Up</button>

  <br><br>

  <input id="guess" type="number">

  <h3 id="msg"></h3>

  <p id="wins"></p>
  <p id="avgScore"></p>

  <p id="fastest"></p>
  <p id="avgTime"></p>

  <ol>
    <li name="leaderboard"></li>
    <li name="leaderboard"></li>
    <li name="leaderboard"></li>
  </ol>

  <script src="script.js"></script>
</body>
</html>
