<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

  <p id="date"></p>

  <h1 class="title">Guessing Game</h1>

  <h3>Difficulty</h3>
  <input type="radio" name="level" value="3" checked> Easy
  <input type="radio" name="level" value="10"> Medium
  <input type="radio" name="level" value="20"> Hard

  <div>
    <label>Custom Range:</label>
    <input type="number" id="customRange" placeholder="Enter max number">
  </div>

  <br>

  <button onclick="play()">Play</button>

  <p id="msg"></p>

  <p id="timer">Timer: 0s</p>

  <input type="number" id="guess" placeholder="Enter guess">
  <button onclick="makeGuess()" disabled id="guessBtn">Guess</button>
  <button onclick="giveUp()" disabled id="giveUpBtn">Give Up</button>

  <h3>Stats</h3>
  <p id="wins">Total wins: 0</p>
  <p id="streak">Current Streak: 0</p>
  <p id="winPercent">Win %: 0%</p>
  <p id="avgScore">Average Score: 0</p>
  <p id="fastest">Fastest: --</p>
  <p id="avgTime">Average Time: --</p>

  <h3>Leaderboard</h3>
  <p class="leaderboard">--</p>
  <p class="leaderboard">--</p>
  <p class="leaderboard">--</p>

</body>
</html>
